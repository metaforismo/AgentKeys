name: AgentKeys
options:
  bundleIdPrefix: dev.agentkeys
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  AgentKeys:
    type: application
    platform: iOS
    sources:
      - path: AgentKeys
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentkeys.app
        PRODUCT_NAME: AgentKeys
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AgentKeys
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: AgentKeys connects to the companion running on your Mac.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: AgentKeys uses the microphone only while you hold push-to-talk.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: AgentKeys turns your voice into prompts on device.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
  AgentKeysTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AgentKeysTests
    dependencies:
      - target: AgentKeys
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentkeys.tests
schemes:
  AgentKeys:
    build:
      targets:
        AgentKeys: all
        AgentKeysTests: [test]
    test:
      targets:
        - AgentKeysTests
