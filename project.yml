name: AgentKeys
options:
  bundleIdPrefix: dev.agentkeys
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  AgentKeys:
    type: application
    platform: iOS
    sources:
      - path: AgentKeys
    info:
      path: AgentKeys/Info.plist
      properties:
        CFBundleDisplayName: AgentKeys
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: AgentKeys connects to the companion running on your Mac.
        NSCameraUsageDescription: AgentKeys uses the camera only to scan the pairing QR code shown by the Mac connector.
        NSMicrophoneUsageDescription: AgentKeys uses the microphone only while you hold push-to-talk.
        CFBundleURLTypes:
          - CFBundleURLName: dev.agentkeys.pairing
            CFBundleURLSchemes: [agentkeys]
        NSSpeechRecognitionUsageDescription: AgentKeys turns your voice into prompts on device.
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentkeys.app
        PRODUCT_NAME: AgentKeys
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
  AgentKeysTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AgentKeysTests
    dependencies:
      - target: AgentKeys
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentkeys.tests
        GENERATE_INFOPLIST_FILE: YES
  AgentKeysUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AgentKeysUITests
    dependencies:
      - target: AgentKeys
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentkeys.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: AgentKeys
schemes:
  AgentKeys:
    build:
      targets:
        AgentKeys: all
        AgentKeysTests: [test]
        AgentKeysUITests: [test]
    test:
      targets:
        - AgentKeysTests
        - AgentKeysUITests
