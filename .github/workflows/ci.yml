name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  connector:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: connector
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm test

  ios:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - run: brew install xcodegen
      - run: xcodegen generate
      - run: xcodebuild -project AgentKeys.xcodeproj -scheme AgentKeys -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5' -derivedDataPath .build/DerivedData CODE_SIGNING_ALLOWED=NO test
