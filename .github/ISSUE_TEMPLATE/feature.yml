name: Feature request
description: Propose a focused improvement to AgentKeys.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What agent-control workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the interaction and its expected result.
    validations:
      required: true
  - type: textarea
    id: trust
    attributes:
      label: Trust-boundary impact
      description: Explain whether this changes authentication, approval, command execution, network exposure, or stored data.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This proposal preserves explicit user approval for sensitive agent actions.
          required: true
        - label: I searched existing issues and the roadmap.
          required: true
